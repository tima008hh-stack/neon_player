name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Build APK as Tank
      run: |
        flutter create my_app --platforms=android
        cp lib/main.dart my_app/lib/main.dart
        cp pubspec.yaml my_app/pubspec.yaml
        cd my_app
        flutter pub get
        flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: neon-player-apk
        path: my_app/build/app/outputs/flutter-apk/app-release.apk
